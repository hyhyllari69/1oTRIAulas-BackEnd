<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style.css" rel="stylesheet">
    <title>Cadastro</title>
        <style>
            body{
                background-color: bisque;
            }
            h1{
                color:black;
                text-align: center;
                font-family:cursive;
            }
        </style>
</head>
<body>
    <header>

    </header>
    <main>
        <h1>Cadastro de Clientes</h1>
        <form>
            <label for="nome">Nome:</label>
            <input type="text" id="nome" required class="input_texto">
            <label for="cpf">CPF:</label>
            <input type="text" id="cpf" placeholder="000.000.000-00" required class="input_texto">
            <label for="dt_nasc">Data de nascimento:</label>
            <input type="date" id="dt_nasc" required class="input_texto">
            <label for="email">Email:</label>
            <input type="email" id="email" required class="input_texto">
            <label for="celular">Celular:</label>
            <input type="tel" id="celular" placeholder="(99) 99999-9999" required class="input_texto">

            <input type="submit" value="Enviar cadastro" class="btn_enviar">
        </form>
    </main>
    <footer>
        
    </footer>
</body>
</html>
