<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style.css" rel="stylesheet">
    <title>Cadastro</title>
    <script>
        function pesquisarCep(cep){
            resposta.textContent = ""
            document.getElementById("rua").value = ""
            document.getElementById("bairro").value = ""
            document.getElementById("cidade").value = ""
            document.getElementById("estado").value = ""

            var validacep = /^[0-9]{8}$/;
        
            const link = 'https://viacep.com.br/ws/' + cep + '/json/?callback=preencherEndereco'
            var script = document.createElement("script")
            script.src = link
            document.body.appendChild(script)
        }
        function preencherEndereco(conteudo){
            if(!("erro" in conteudo)) {
            document.getElementById("rua").value = conteudo.logradouro
            document.getElementById("bairro").value = conteudo.bairro
            document.getElementById("cidade").value = conteudo.localidade
            document.getElementById("estado").value = conteudo.uf

        } else {
            resposta.textContent = "O CEP digitado não existe!!!"
        }
    }
            
    </script>
</head>
<body>
    <header>

    </header>
    <main>
        <h1>Cadastro</h1>
        <form>
            <label for="nome">Nome</label>
            <input type="text" id="nome" required class="input_texto">
            <label for="cpf">CPF</label>
            <input type="text" id="cpf" placeholder="000.000.000-00"required class="input_texto">
            <label for="dt_nasc">Data de nascimento</label>
            <input type="date" id="dt_nasc" required class="input_texto">
            <label for="email">Email</label>
            <input type="email" id="email" required class="input_texto">
            <label for="celular">Celular</label>
            <input type="tel" id="celular" placeholder="(99) 99999-9999"required class="input_texto">
            <label for="senha">Senha</label>
            <input type="text" id="senha" required>
            <!--CEP, Rua, Número, Bairro, Cidade, Estado(UF), Senha-->
            <h2>Endereço:</h2>
            <label for="cep">CEP</label>
            <input type="text" id="cep" onblur="pesquisarCep(this.value)">
            <p id="resposta"></p>
            <label for="estado">Rua</label>
            <input type="text" id="rua" required>
            <label for="numero">Número</label>
            <input type="text" id="numero" required>
            <label for="bairro">Bairro</label>
            <input type="text" id="bairro" required>
            <label for="cidade">Cidade</label>
            <input type="text" id="cidade" required>
            <label for="estado">Estado</label>
            <input type="text" id="estado" placeholder="UF"required>

            <input type="submit" value="Enviar cadastro" class="btn_enviar">
        </form>
    </main>
    <footer>

    </footer>
</body>
</html>
